<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clase — Hide &amp; Speak</title>
  <link rel="stylesheet" href="../../css/estilos.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="cl-header">
    <a href="../../index.html" class="cl-brand">
      <img src="../../img/Solo_logo-removebg-preview.png" alt="Hide & Speak logo" />
      Hide &amp; <span class="accent">Speak</span>
    </a>
    <button class="cl-user" id="userName" onclick="cerrarSesion()" title="Cerrar sesión">Nombre de Usuario</button>
  </header>

  <div class="cl-layout">

    <!-- Columna izquierda: form de pregunta -->
    <main class="cl-left">
      <div class="cl-card">
        <h1 class="cl-title" id="className">Clase (curso)</h1>

        <label class="cl-label" for="f-text">Dejá tu pregunta acá</label>
        <textarea
          class="cl-textarea"
          id="f-text"
          maxlength="500"
          placeholder="Escribe tu mensaje aquí..."
        ></textarea>
        <div class="cl-counter"><span id="charCount">0</span>/500</div>

        <!-- Barra de color: preview del color asignado según categoría elegida -->
        <div class="cl-colorbar" id="colorBar" aria-hidden="true"></div>

        <div class="cl-anonrow">
          <span class="cl-label cl-label-inline">¿Querés que sea anónimo?</span>
          <div class="cl-toggle-group" role="group" aria-label="Anónimo">
            <button type="button" class="cl-toggle-btn active" id="btnAnonSi" data-value="true">Si</button>
            <button type="button" class="cl-toggle-btn" id="btnAnonNo" data-value="false">No</button>
          </div>
        </div>

        <div class="cl-categorias">
          <span class="cl-label cl-label-inline">Categoría:</span>
          <div class="cl-cat-grid" id="catGrid">
            <button type="button" class="cl-cat-btn" data-cat="desarrollo">Desarrollar</button>
            <button type="button" class="cl-cat-btn" data-cat="repetir">Repetir / Reformular</button>
            <button type="button" class="cl-cat-btn" data-cat="duda_puntual">Duda puntual</button>
            <button type="button" class="cl-cat-btn" data-cat="significado">Significado</button>
            <button type="button" class="cl-cat-btn" data-cat="curiosidad">Curiosidad</button>
          </div>
        </div>

        <div id="send-error" class="alert alert-error" style="display:none"></div>

        <div class="cl-footer-row">
          <button class="cl-btn-enviar" id="btnEnviar">Enviar</button>
        </div>
      </div>
    </main>

    <!-- Columna derecha: feed de preguntas en vivo -->
    <aside class="cl-right">
      <div class="cl-right-header">Mensajes</div>
      <div class="cl-feed" id="feed">
        <p class="cl-feed-empty" id="feedEmpty">Todavía no hay preguntas en esta clase.</p>
      </div>
    </aside>

  </div>

  <script src="../../js/api.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="../../js/socket.js"></script>
  <script src="main.js"></script>
</body>
</html>
</body>
</html>
