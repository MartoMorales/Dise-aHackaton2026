<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis clases — Hide &amp; Speak</title>
  <link rel="stylesheet" href="../../css/estilos.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="ga-header">
    <a href="../../index.html" class="ga-brand">
      <img src="../../img/Solo_logo-removebg-preview.png" alt="Hide & Speak logo" />
      Hide &amp; <span class="accent">Speak</span>
    </a>
    <div class="ga-header-right">
      <div class="ga-avatar" id="userAvatar">A</div>
      <button class="ga-user" id="userName" onclick="cerrarSesion()" title="Cerrar sesión">Nombre de Usuario</button>
    </div>
  </header>

  <section class="join-bar">
    <input
      class="ga-input"
      type="text"
      id="joinCodeInput"
      maxlength="6"
      autocomplete="off"
      placeholder="Código de clase"
    />
    <button class="ga-btn-unirse" id="btnJoin">Unirse</button>
  </section>

  <main class="ga-wrap">
    <h2 class="section-title">Clases activas ahora</h2>
    <div class="class-grid" id="activeGrid"></div>

    <h2 class="section-title">Todas mis clases</h2>
    <div class="class-grid" id="allGrid"></div>
  </main>

  <div class="modal-overlay" id="modal-join">
    <div class="modal">
      <h3>¿Unirte a esta clase?</h3>
      <p><strong>Materia:</strong> <span id="mji-subject">—</span></p>
      <p><strong>Curso:</strong>   <span id="mji-course">—</span></p>
      <p><strong>Código:</strong>  <span id="mji-code">—</span></p>
      <div class="modal-actions">
        <button class="ga-btn-unirse" id="btnConfirmJoin">Confirmar</button>
        <button class="btn-secondary" onclick="cerrarModal('modal-join')">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="../../js/api.js"></script>
  <script src="main.js"></script>
</body>
</html>
