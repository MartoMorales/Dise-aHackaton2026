<!-- front/index.html

  Pantalla de inicio (landing). Solo presentacion, sin logica de negocio.
  Estetica "Hide & Speak": header gradiente, hero con frase + stats e imagen.
--><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hide &amp; Speak — Preguntas anónimas en clase</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    /* ── Paleta local de la landing ── */
    .landing {
      --ink:    #000000;
      --gold:   #FFC145;
      --gold-d: #f0ad2e;
      --orange: #F75C03;
      --head:   #87B1FF;
    }

    body {
      background: #ffffff; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    .lp-header {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: var(--head);
    }
    .lp-brand {
      display: flex; align-items: center; gap: 12px;
      font-size: 26px; font-weight: 600; color: var(--ink);
      text-decoration: none;
    }
    .lp-brand .lp-logo {
      height: 54px; width: auto; object-fit: contain;
    }
    .lp-brand .accent { color: var(--orange); }
    .lp-nav { display: flex; align-items: center; gap: 14px; }
    .lp-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 11px 30px; border-radius: 999px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; text-decoration: none; border: none;
      transition: transform .15s, box-shadow .15s, background .15s;
    }
    .lp-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }
    .lp-btn-login  { background: #D4E7FF; color: var(--ink); }
    .lp-btn-signup { background: var(--gold); color: var(--ink); }
    .lp-btn-signup:hover { background: var(--gold-d); }

    /* ── Hero ── */
    .lp-hero {
      flex: 1 1 auto; min-height: 0;
      max-width: 1500px; width: 100%; margin: 0 auto;
      padding: 0 44px;
      display: grid; grid-template-columns: 1fr 1.25fr;
      gap: 64px; align-items: center;
    }
    .lp-hero h1 {
      font-size: clamp(2.9rem, 5vw, 4.4rem); font-weight: 600; line-height: 1.08;
      color: var(--ink); margin: 0 0 clamp(28px, 6vh, 56px);
    }
    .lp-stats { display: flex; gap: 44px; flex-wrap: wrap; }
    .lp-stat .num {
      font-size: clamp(1.6rem, 2.4vw, 2.2rem); font-weight: 600; color: var(--ink);
    }
    .lp-stat .lbl {
      font-size: 15px; color: #000000; margin-top: 2px;
    }
    .lp-hero-img {
      width: 100%; height: min(78vh, 620px); object-fit: cover;
      border-radius: 20px; box-shadow: 0 18px 50px rgba(0,0,0,.18);
      background: #e8edf6;
    }

    @media (max-width: 880px) {
      body { height: auto; overflow: auto; }
      .lp-header { padding: 12px 20px; }
      .lp-hero {
        grid-template-columns: 1fr; gap: 32px; padding: 40px 20px;
      }
      .lp-hero h1 { font-size: 2.3rem; margin-bottom: 28px; }
      .lp-hero-img { height: 46vh; }
      .lp-btn { padding: 9px 20px; font-size: 14px; }
    }
  </style>
</head>
<body class="landing">

  <!-- Header -->
  <header class="lp-header">
    <a href="index.html" class="lp-brand">
      <img class="lp-logo" src="img/Solo_logo-removebg-preview.png" alt="Hide & Speak logo" />
      Hide &amp; <span class="accent">Speak</span>
    </a>
    <nav class="lp-nav">
      <a href="login/login.html" class="lp-btn lp-btn-login">Log In</a>
      <a href="login/login.html" class="lp-btn lp-btn-signup">Sign Up</a>
    </nav>
  </header>

  <!-- Hero -->
  <section class="lp-hero">
    <div class="lp-hero-text">
      <h1>La forma más<br/>simple de<br/>participar en<br/>clase</h1>
      <div class="lp-stats">
        <div class="lp-stat">
          <div class="num">100%</div>
          <div class="lbl">verificado</div>
        </div>
        <div class="lp-stat">
          <div class="num">+100</div>
          <div class="lbl">instituciones inscriptas</div>
        </div>
        <div class="lp-stat">
          <div class="num">+10000</div>
          <div class="lbl">preguntas respondidas</div>
        </div>
      </div>
    </div>

    <img
      class="lp-hero-img"
      src="img/inicio.jpg"
      alt="Estudiantes participando en clase"
    />
  </section>

</body>
</html>
