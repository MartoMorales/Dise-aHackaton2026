<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome — Hide &amp; Speak</title>
  <link rel="stylesheet" href="../css/estilos.css" />
  <style>
    :root {
      --gold:   #FFC145;
      --gold-d: #f0ad2e;
      --orange: #F75C03;
      --panel:  #D9EFFF;
      --ink:    #1e2230;
    }

    body {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 2fr 1fr;
      background: var(--panel);
    }

    /* ── Panel izquierdo (imagen) ── */
    .login-aside {
      position: relative;
      background: #0f1b3d center/cover no-repeat
        url('../img/image (13).png');
    }
    .login-aside::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(120deg, rgba(15,27,61,.25), rgba(37,99,235,.18));
    }
    .aside-arrow {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      z-index: 2;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,.85); color: var(--ink);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    /* ── Panel derecho (form) ── */
    .login-main {
      display: flex; align-items: center; justify-content: center;
      padding: 48px 40px;
      background: var(--panel);
    }
    .login-box { width: 100%; max-width: 440px; }
    .login-box h1 {
      font-size: 5.4rem; font-weight: 600; color: var(--ink);
      line-height: 1; margin: 0 0 2px; text-align: center;
    }
    .login-box .subtitle {
      color: #475569; font-size: 17px; margin-bottom: 30px;
      text-align: center;
    }

    .btn-google {
      width: 100%; padding: 14px;
      display: flex; align-items: center; justify-content: center; gap: 11px;
      background: #ffffff; color: var(--ink);
      border: 1px solid #cbd5e1; border-radius: 11px;
      font-family: inherit; font-size: 17px; font-weight: 600;
      cursor: pointer; transition: background .15s;
      margin-bottom: 26px;
    }
    .btn-google:hover { background: #f1f5f9; }
    .btn-google img { width: 20px; height: 20px; }

    .login-form .input-group { margin-bottom: 18px; }
    .login-form label {
      display: block; font-size: 16px; font-weight: 600;
      margin-bottom: 7px; color: var(--ink);
    }
    .login-form .input-wrap { position: relative; }
    .login-form input {
      width: 100%; padding: 14px 16px;
      border: 1px solid #cbd5e1; border-radius: 9px;
      font-family: inherit; font-size: 17px; color: var(--ink);
      background: white; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .login-form input:focus {
      border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }
    .login-form input::placeholder { color: #94a3b8; }
    .toggle-eye {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: #64748b; padding: 0;
      width: 24px; height: 24px; line-height: 24px; text-align: center;
    }
    /* Estado "oculto": palito diagonal que tapa el ojo */
    .toggle-eye.is-off::after {
      content: '';
      position: absolute; left: 50%; top: 50%;
      width: 24px; height: 2.5px; border-radius: 2px;
      background: #475569;
      box-shadow: 0 -1px 0 rgba(255,255,255,.9);
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .forgot {
      display: block; text-align: right;
      color: var(--orange); font-size: 14px; font-weight: 600;
      text-decoration: none; margin: -4px 0 24px;
    }
    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%; padding: 15px;
      background: var(--gold); color: var(--ink);
      border: none; border-radius: 11px;
      font-family: inherit; font-size: 17px; font-weight: 700;
      cursor: pointer; transition: background .15s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--gold-d); transform: translateY(-1px); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-login .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.25); border-top-color: var(--ink);
      border-radius: 50%; animation: spin .6s linear infinite; display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert-error {
      background: #FEE2E2; color: #DC2626; border: 1px solid #FECACA;
      padding: 11px 14px; border-radius: 8px;
      font-size: 14px; margin-bottom: 16px; display: none;
    }

    .signup-line {
      text-align: center; margin-top: 26px;
      color: var(--ink); font-size: 16px; font-weight: 600;
    }
    .signup-line a { color: var(--orange); text-decoration: none; }
    .signup-line a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .login-aside { display: none; }
      .login-main { padding: 40px 24px; align-items: flex-start; padding-top: 56px; }
      .login-box h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

  <!-- Panel izquierdo: imagen -->
  <aside class="login-aside">
    <button class="aside-arrow" type="button" aria-label="Anterior">‹</button>
  </aside>

  <!-- Panel derecho: formulario -->
  <main class="login-main">
    <div class="login-box">
      <h1>Welcome!</h1>
      <p class="subtitle">Continue with Google or enter your details.</p>

      <button class="btn-google" type="button" id="btnGoogle">


      <div id="error" class="alert-error"></div>

      <form class="login-form" id="formLogin" novalidate>
        <div class="input-group">
          <label for="usuario">Username</label>
          <div class="input-wrap">
            <input
              type="text"
              id="usuario"
              name="usuario"
              placeholder="example@gmail.com"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-eye is-off" id="toggleEye" aria-label="Mostrar contraseña">👁️</button>
          </div>
        </div>

        <a href="#" class="forgot">Forgot Password?</a>

        <button type="submit" class="btn-login" id="btnLogin">
          <div class="spinner"></div>
          <span class="btn-label">Login</span>
        </button>
      </form>

    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="login.js"></script>
  <script>
    // Mostrar/ocultar contraseña
    document.getElementById("toggleEye").addEventListener("click", () => {
      const input = document.getElementById("password");
      const btn = document.getElementById("toggleEye");
      const oculta = input.type === "password";
      input.type = oculta ? "text" : "password";
      // Con la contraseña oculta mostramos el palito; al verla, lo sacamos
      btn.classList.toggle("is-off", !oculta);
    });
  </script>
</body>
</html>
