<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sala — Hide &amp; Speak</title>
  <link rel="stylesheet" href="../../css/estilos.css" />
  <style>
    :root {
      --head:    #87B1FF;
      --gold:    #FFC145;
      --gold-d:  #f0ad2e;
      --orange:  #F75C03;
      --bar:     #054A52;   /* barra de la clase */
      --teal:    #458087;   /* fondo principal */
      --msg:     #D9EFFF;   /* tarjeta de mensaje */
    }
    body { min-height: 100vh; background: var(--teal); }

    /* ── Header (igual a las otras pantallas) ── */
    .pc-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: var(--head);
    }
    .pc-brand {
      display: flex; align-items: center; gap: 12px;
      font-size: 26px; font-weight: 600; color: #000;
      text-decoration: none;
    }
    .pc-brand img { height: 54px; width: auto; object-fit: contain; }
    .pc-brand .accent { color: var(--orange); }
    .pc-user {
      background: #FFC145; color: #1e2230;
      border: none; border-radius: 999px;
      padding: 14px 38px; font-family: inherit;
      font-size: 17px; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .pc-user:hover { background: var(--gold-d); transform: translateY(-1px); }
    .pc-actions { display: flex; align-items: center; gap: 14px; }
    .pc-back {
      background: #D9EFFF; color: #1e2230;
      border: none; border-radius: 999px;
      padding: 14px 26px; font-family: inherit;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .pc-back:hover { background: #fff; transform: translateY(-1px); }

    /* ── Barra de la clase ── */
    .cls-bar {
      background: var(--bar); color: #fff;
      padding: 26px 64px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 30px; font-weight: 700;
    }

    /* ── Lista de mensajes ── */
    .cls-main {
      padding: 28px 64px 80px;
      display: flex; flex-direction: column; gap: 26px;
    }

    .msg-card {
      background: var(--msg);
      border-radius: 20px;
      padding: 22px 26px;
      box-shadow: 0 4px 14px rgba(0,0,0,.14);
    }
    .msg-card h3 {
      color: #0b1f33; font-size: 21px; font-weight: 800; margin: 0 0 14px;
    }
    .msg-box {
      background: #F4FAFF;
      border-radius: 22px;
      padding: 15px 24px;
      font-size: 16px; line-height: 1.4;
      color: #2a3b4d;
      white-space: pre-wrap;
      overflow-wrap: break-word; word-break: break-word;
    }
    .msg-box.placeholder { color: #8a98ad; }

    .msg-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-top: 18px;
    }
    .msg-cat {
      display: inline-block;
      padding: 7px 18px; border-radius: 8px;
      font-size: 14px; font-weight: 700; color: #fff;
    }

    .msg-actions {
      display: flex; justify-content: flex-end; gap: 12px;
    }
    .msg-btn {
      border: none; border-radius: 8px;
      padding: 9px 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: filter .15s, transform .15s;
    }
    .msg-btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
    .msg-ok  { background: #1AD302; color: #fff; font-size: 20px; font-weight: 800; }
    .msg-del { background: #DB0000; }

    .cls-empty {
      color: #eaf3f5; font-size: 16px; text-align: center; padding: 40px 0;
    }

    @media (max-width: 640px) {
      .pc-header { padding: 12px 18px; }
      .cls-bar { padding: 14px 18px; font-size: 16px; flex-direction: column; gap: 4px; align-items: flex-start; }
      .cls-main { padding: 20px 18px 60px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="pc-header">
    <a href="../general/index.html" class="pc-brand">
      <img src="../../img/Solo_logo-removebg-preview.png" alt="Hide & Speak logo" />
      Hide &amp; <span class="accent">Speak</span>
    </a>
    <div class="pc-actions">
      <button class="pc-back" onclick="window.location.href='../general/index.html'">← Mis clases</button>
      <button class="pc-user" id="userName" onclick="cerrarSesion()" title="Cerrar sesión">Nombre de Usuario</button>
    </div>
  </header>

  <!-- Barra de la clase -->
  <div class="cls-bar">
    <span id="clsName">Clase: —</span>
    <span id="clsCode">Código: ——</span>
  </div>

  <!-- Lista de mensajes -->
  <div class="cls-main" id="msgList"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="../../js/api.js"></script>
  <script src="main.js"></script>
</body>
</html>
