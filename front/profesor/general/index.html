<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tus clases — Hide &amp; Speak</title>
  <link rel="stylesheet" href="../../css/estilos.css" />
  <style>
    :root {
      --head:   #87B1FF;
      --gold:   #FFC145;
      --gold-d: #f0ad2e;
      --orange: #F75C03;
      --card:   #365D61;
      --descbg: #D4E7FF;
    }
    body { min-height: 100vh; background: #EEF4F9; }

    /* ── Header ── */
    .pc-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: var(--head);
    }
    .pc-brand {
      display: flex; align-items: center; gap: 12px;
      font-size: 26px; font-weight: 600; color: #000;
      text-decoration: none;
    }
    .pc-brand img { height: 54px; width: auto; object-fit: contain; }
    .pc-brand .accent { color: var(--orange); }
    .pc-user {
      background: #FFC145; color: #1e2230;
      border: none; border-radius: 999px;
      padding: 14px 38px; font-family: inherit;
      font-size: 17px; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .pc-user:hover { background: var(--gold-d); transform: translateY(-1px); }

    /* ── Contenido ── */
    .pc-wrap { padding: 32px 40px 120px; }
    .pc-title {
      font-size: 3.6rem; font-weight: 600; color: #000;
      margin: 0 0 28px;
    }

    /* ── Grilla de clases ── */
    /* Exactamente 3 columnas; el gap entre tarjetas = margen lateral (40px) */
    /* 3 columnas reales; las tarjetas se reparten por orden de creación
       (1→col1, 2→col2, 3→col3, 4→col1…) y cada columna apila independiente */
    .pc-grid {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
    .pc-col {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 40px;
    }

    /* ── Tarjeta ── */
    .pc-card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px 22px;
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
    }
    .pc-card h3 {
      color: #fff; font-size: 40px; font-weight: 400; margin: 0;
    }
    .pc-desc {
      background: var(--descbg);
      border-radius: 10px;
      padding: 13px 15px;
      font-size: 14px; line-height: 1.4;
      color: #8a98ad;            /* tono "placeholder" */
      min-height: 46px;          /* alto mínimo; crece hacia abajo si hace falta */
      white-space: pre-wrap;     /* respeta saltos de línea y envuelve el texto */
      overflow-wrap: break-word; /* corta palabras largas para no agrandar el ancho */
      word-break: break-word;
    }
    .pc-desc.filled { color: #1e2230; }
    .pc-card-footer { display: flex; justify-content: flex-end; gap: 12px; }
    .pc-iniciar {
      background: var(--gold); color: #1e2230;
      border: none; border-radius: 8px;
      padding: 9px 26px; font-family: inherit;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .pc-iniciar:hover { background: var(--gold-d); transform: translateY(-1px); }
    .pc-eliminar {
      background: #e5484d; color: #fff;
      border: none; border-radius: 8px;
      padding: 9px 16px; font-family: inherit;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .pc-eliminar:hover { background: #c93b40; transform: translateY(-1px); }

    .pc-empty {
      color: #64748b; font-size: 15px; padding: 24px 0;
    }

    /* ── FAB ── */
    .fab {
      position: fixed; right: 30px; bottom: 30px;
      width: 86px; height: 86px; border-radius: 50%;
      background: var(--orange); color: #fff; border: none;
      font-size: 48px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(0,0,0,.28);
      transition: transform .15s, box-shadow .15s;
    }
    .fab:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 10px 24px rgba(0,0,0,.32); }

    /* ── Modal: form ── */
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 16px; font-weight: 600; color: var(--text); }

    /* Modal "Nueva clase" agrandado proporcionalmente */
    #modal-crear .modal { max-width: 720px; padding: 52px; }
    #modal-crear .modal-header { margin-bottom: 34px; }
    #modal-crear .modal-header h2 { font-size: 2.1rem; }
    #modal-crear .form-group label { font-size: 18px; }
    #modal-crear .input { font-size: 19px; padding: 15px 18px; }
    #modal-crear .btn { font-size: 18px; padding: 16px 28px; }

    @media (max-width: 640px) {
      .pc-header { padding: 12px 18px; }
      .pc-wrap { padding: 20px 18px 100px; }
      .pc-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="pc-header">
    <a href="../../index.html" class="pc-brand">
      <img src="../../img/Solo_logo-removebg-preview.png" alt="Hide & Speak logo" />
      Hide &amp; <span class="accent">Speak</span>
    </a>
    <button class="pc-user" id="userName" onclick="cerrarSesion()" title="Cerrar sesión">Nombre de Usuario</button>
  </header>

  <!-- Contenido -->
  <div class="pc-wrap">
    <h1 class="pc-title">Tus clases</h1>
    <div class="pc-grid" id="classesGrid"></div>
  </div>

  <!-- FAB crear clase -->
  <button class="fab" id="fab" title="Crear nueva clase">+</button>

  <!-- Modal: nueva clase -->
  <div class="modal-overlay" id="modal-crear">
    <div class="modal">
      <div class="modal-header">
        <h2>Nueva clase</h2>
        <button class="modal-close" onclick="cerrarModal('modal-crear')">✕</button>
      </div>
      <div id="crear-error" class="alert alert-error" style="display:none"></div>
      <div class="form-group">
        <label>Nombre de la clase *</label>
        <input class="input" type="text" id="f-name" placeholder="Ej: Historia 5to A" />
      </div>
      <div class="form-group" style="margin-top:16px">
        <label>Descripción</label>
        <textarea class="input" id="f-desc" placeholder="Descripción de la clase" style="min-height:80px"></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px">
        <button class="btn btn-ghost" style="flex:1" onclick="cerrarModal('modal-crear')">Cancelar</button>
        <button class="btn btn-primary" style="flex:2" id="btnCrearConfirm">Crear clase</button>
      </div>
    </div>
  </div>

  <script src="../../js/api.js"></script>
  <script src="main.js"></script>
</body>
</html>
